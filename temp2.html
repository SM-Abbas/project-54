<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
            color: black;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark-mode {
            background-color: #121212;
            color: white;
        }

        .dashboard {
            display: flex;
            width: 100%;
            height: 100vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        .sidebar {
            width: 25%;
            padding: 20px;
            border-right: 1px solid #ccc;
            background: #f5f5f5;
            border-radius: 20px 0 0 20px;
            transition: background 0.3s;
        }

        .dark-mode .sidebar {
            background: #1e1e1e;
            border-right: 1px solid #444;
        }

        .new-chat {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #007bff;
            color: white;
            transition: background 0.3s, transform 0.2s;
            font-size: 16px;
        }

        .new-chat:hover {
            background: #0056b3;
            transform: scale(1.05);
        }

        .chat-list {
            padding: 0;
        }

        .chat-list li {
            list-style: none;
            padding: 12px;
            margin: 5px 0;
            background-color: #ddd;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .dark-mode .chat-list li {
            background: #444;
        }

        .chat-list li .delete-chat {
            cursor: pointer;
            background: none;
            border: none;
            font-size: 16px;
            color: red;
        }

        .chat-section {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 20px;
            background-color: #f8f8f8;
            border-radius: 15px;
            height: 300px;
            transition: background 0.3s;
        }

        .dark-mode .chat-box {
            background: #222;
            border-color: #555;
        }

        .chat-input {
            display: flex;
            margin-top: 15px;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-size: 16px;
        }

        #sendBtn {
            padding: 12px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: #28a745;
            color: white;
            transition: background 0.3s;
        }

        #sendBtn:hover {
            background: #218838;
        }

        .profile {
            position: relative;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        #profilePic {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s;
            border: 2px solid #ddd;
        }

        #profilePic:hover {
            transform: scale(1.1);
        }

        .profile-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 80px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            width: 230px;
            transition: all 0.3s ease;
        }

        .profile-menu.active {
            display: block;
        }

        .profile-menu input[type="file"] {
            margin-top: 10px;
            display: block;
            width: 100%;
            border-radius: 12px;
            padding: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .file-preview {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .file-item span {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-preview img, .file-preview object {
            max-width: 100%;
            max-height: 150px;
            border-radius: 10px;
        }

        .delete-file {
            cursor: pointer;
            color: red;
            font-weight: bold;
        }

        .switch input {
            appearance: none;
            width: 40px;
            height: 20px;
            background: #ccc;
            border-radius: 10px;
            position: relative;
            transition: background 0.3s ease;
            cursor: pointer;
        }

        .switch input:checked {
            background: #007bff;
        }

        .switch input::before {
            content: "";
            position: absolute;
            top: 2px;
            left: 3px;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        .switch input:checked::before {
            transform: translateX(20px);
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 15px;
        }

        .chat-header h1 {
            font-size: 24px;
            font-weight: bold;
        }

        .attach-btn {
            font-size: 24px;
            cursor: pointer;
        }

        .documents-preview {
            margin-top: 20px;
            background: #f1f1f1;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .documents-preview h3 {
            margin-bottom: 10px;
        }

        .documents-preview .file-item {
            margin-bottom: 12px;
        }

        .documents-preview img, .documents-preview object {
            max-width: 100%;
            max-height: 150px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        /* Chat Bubble Styling */
        .message {
            background-color: #007bff;
            color: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 20px;
            max-width: 70%;
            word-wrap: break-word;
            display: inline-block;
            font-size: 16px;
        }

        .message.bot {
            background-color: #444;
        }

        .chat-box {
            display: flex;
            flex-direction: column;
        }

    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="chat-header">
                <h1>LegalMind</h1>
                <div class="profile">
                    <img src="profile-pic.jpg" alt="Profile" id="profilePic">
                    <div class="profile-menu" id="profileMenu">
                        <p><strong>User Name</strong></p>
                        <p>Subscription: Premium</p>
                        <button class="settings">Settings</button>
                        <label class="switch">
                            <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
                            Dark Mode
                        </label>
                        <input type="file" id="uploadProfile" onchange="uploadProfilePicture(event)" accept="image/*">
                    </div>
                </div>
            </div>
            <button class="new-chat" onclick="addNewChat()">New Chat</button>
    
            <ul class="chat-list" id="chatList"></ul>

            <div class="documents-preview">
                <h3>Documents Preview</h3>
                <div id="documentPreviews"></div>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-box" id="chatBox"></div>
            <div class="chat-input">
                <span class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</span>
                <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.png,.jpg" style="display:none;" onchange="previewFile(event)">
                <input type="text" id="messageInput" placeholder="Type your message..." >
                <button id="sendBtn" onclick="sendMessage()">Send</button>
                
            </div>
        </div>
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
        }

        function addNewChat() {
            const chatList = document.getElementById("chatList");
            const chatItem = document.createElement("li");
            const chatId = "Chat " + (chatList.children.length + 1);
            chatItem.innerHTML = chatId + ' <button class="delete-chat" onclick="deleteChat(this)">❌</button>';
            chatList.appendChild(chatItem);
            document.getElementById("currentChat").textContent = "Current Chat: " + chatId;
        }

        function deleteChat(button) {
            button.parentElement.remove();
            document.getElementById("currentChat").textContent = "Current Chat: None";
        }

        function sendMessage() {
            const messageInput = document.getElementById("messageInput");
            const chatBox = document.getElementById("chatBox");
            const defaultReplies = [
                "Hello! How can I help you today?",
                "What can I assist you with?",
                "Need help? Just ask!",
                "Hi there! Ask me anything.",
                "How can I assist you with LegalMind?"
            ];
            if (messageInput.value.trim()) {
                const userMessage = document.createElement("div");
                userMessage.textContent = messageInput.value;
                userMessage.classList.add("message");
                chatBox.appendChild(userMessage);
                messageInput.value = "";

                // Add a random default reply after sending a message
                setTimeout(() => {
                    const botReply = document.createElement("div");
                    botReply.textContent = defaultReplies[Math.floor(Math.random() * defaultReplies.length)];
                    botReply.classList.add("message", "bot");
                    chatBox.appendChild(botReply);
                }, 1000);
            }
        }

        function uploadProfilePicture(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function() {
                    document.getElementById("profilePic").src = reader.result;
                }
                reader.readAsDataURL(file);
            }
        }

        function previewFile(event) {
            const filePreview = document.getElementById("documentPreviews");
            const file = event.target.files[0];
            const fileItem = document.createElement("div");
            fileItem.classList.add("file-item");

            const fadeOut = () => {
                fileItem.style.opacity = 0;
                setTimeout(() => {
                    filePreview.removeChild(fileItem);
                }, 300);
            }

            const fileType = file.type.split('/')[0];
            const filePreviewElement = document.createElement(fileType === 'image' ? 'img' : 'object');
            if (fileType === 'application') {
                filePreviewElement.type = "application/pdf";
            }
            const reader = new FileReader();
            reader.onload = function() {
                filePreviewElement.src = reader.result;
                fileItem.appendChild(filePreviewElement);
                filePreview.appendChild(fileItem);
                fadeOut();
            }
            reader.readAsDataURL(file);
        }

        document.getElementById("profilePic").addEventListener("click", () => {
            document.getElementById("profileMenu").classList.toggle("active");
        });
    </script>
</body>
</html>
